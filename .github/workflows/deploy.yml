name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches: ["main"]

concurrency:
  group: analytics-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 188.245.176.56
          username: mete
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cleanup() {
              sudo systemctl start analytics-recompute.service >/dev/null 2>&1 || true
              sudo systemctl start analytics-alert.service >/dev/null 2>&1 || true
            }
            trap cleanup EXIT
            git config --global --add safe.directory /opt/analytics
            cd /opt/analytics
            git fetch origin main
            git reset --hard origin/main
            chmod +x ops/*.sh || true
            sudo cp ops/analytics-alert.service /etc/systemd/system/analytics-alert.service
            sudo systemctl daemon-reload
            sudo systemctl enable analytics-alert.service >/dev/null 2>&1 || true
            if [ -f /tmp/codex-cache-all-5m.pid ]; then
              kill "$(cat /tmp/codex-cache-all-5m.pid)" >/dev/null 2>&1 || true
              rm -f /tmp/codex-cache-all-5m.pid
            fi
            sudo systemctl stop analytics-recompute.service >/dev/null 2>&1 || true
            sudo systemctl stop analytics-alert.service >/dev/null 2>&1 || true
            docker exec -i analytics-postgres-1 psql -U analytics -d analytics < ops/apply-panel-alerting.sql
            docker build -t analytics-app:latest .
            docker network inspect analytics_default >/dev/null 2>&1 || docker network create analytics_default
            docker rm -f analytics-app-1 >/dev/null 2>&1 || true
            for i in $(seq 1 10); do
              if ! docker ps -a --format '{{.Names}}' | grep -qx analytics-app-1; then
                break
              fi
              sleep 1
            done
            docker run -d \
              --name analytics-app-1 \
              --restart unless-stopped \
              --network analytics_default \
              --network-alias app \
              -e NODE_ENV=production \
              -e DATABASE_URL='postgresql://analytics:Analytics2025Pass@analytics-postgres-1:5432/analytics?connection_limit=20&pool_timeout=60' \
              -e AUTH_SECRET='change-me' \
              -e NEXTAUTH_URL='https://giris.elmasistatistik.com.tr' \
              -e NEXT_PUBLIC_HOST_URL='https://giris.elmasistatistik.com.tr' \
              -e REDIS_URL='redis://analytics-redis-1:6379' \
              -e TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}' \
              -e TELEGRAM_DEFAULT_CHAT_ID='${{ secrets.TELEGRAM_DEFAULT_CHAT_ID }}' \
              -e TELEGRAM_WEBHOOK_SECRET='${{ secrets.TELEGRAM_WEBHOOK_SECRET }}' \
              -e TZ='Europe/Istanbul' \
              analytics-app:latest \
              npm start
            docker restart analytics-caddy-1 >/dev/null 2>&1 || true
            for i in $(seq 1 30); do
              if curl -fsS https://giris.elmasistatistik.com.tr/api/health >/dev/null; then
                echo "Health check passed."
                env \
                  NEXT_PUBLIC_HOST_URL='https://giris.elmasistatistik.com.tr' \
                  TELEGRAM_BOT_TOKEN='${{ secrets.TELEGRAM_BOT_TOKEN }}' \
                  TELEGRAM_WEBHOOK_SECRET='${{ secrets.TELEGRAM_WEBHOOK_SECRET }}' \
                  bash ops/configure-telegram-bot.sh || true
                exit 0
              fi
              sleep 2
            done
            echo "Health check failed after retries. Debug output:"
            docker ps --format "table {{.Names}}\t{{.Status}}"
            docker logs --tail=120 analytics-app-1 || true
            docker logs --tail=120 analytics-caddy-1 || true
            exit 1
